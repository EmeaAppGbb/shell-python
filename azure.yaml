name: shell-python
infra:
  provider: bicep
  path: ./infra

services:
  api:
    project: ./src/api
    host: containerapp
    language: python
  web:
    project: ./src/web
    host: containerapp
    language: ts

resources:
  api:
    type: host.containerapp
    port: 8080
  web:
    type: host.containerapp
    uses:
      - api
    port: 3000

hooks:
  predeploy:
    posix:
      shell: sh
      run: ./infra/scripts/predeploy.sh
      continueOnError: false
    windows:
      shell: pwsh
      run: ./infra/scripts/predeploy.ps1
      continueOnError: false
  postprovision:
    posix:
      shell: sh
      run: ./infra/scripts/postprovision.sh
      continueOnError: false
    windows:
      shell: pwsh
      run: ./infra/scripts/postprovision.ps1
      continueOnError: false
